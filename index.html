<!DOCTYPE html>
<html lang="ja">
<head>

<script type="module">

import { getStorage, ref, uploadBytesResumable, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

// =====================================================

const firebaseConfig = {
  apiKey: "AIzaSyA7NQXCafSoB8ETqesiaUjUN_RyZMEhZho",
  authDomain: "ziptool-a81c8.firebaseapp.com",
  projectId: "ziptool-a81c8",
  storageBucket: "ziptool-a81c8.firebasestorage.app",
  messagingSenderId: "1045141173652",

window._fbReady = true;
document.dispatchEvent(new Event('fb-ready'));
</script>
<style>
/* ── Reset ── */
*{box-sizing:border-box;margin:0;padding:0}

/* ── Design Tokens ── */
:root{
  --c-bg:#fafafa;
  --c-surface:#ffffff;
  --c-surface2:#f4f4f5;
  --c-surface3:#e4e4e7;
  --c-border:#e4e4e7;
  --c-border2:#d4d4d8;
  --c-text:#09090b;
  --c-text2:#52525b;
  --c-text3:#a1a1aa;
  --c-blue:#2563eb;
  --c-blue-light:#eff6ff;
  --c-blue-dark:#1d4ed8;
  --c-red:#dc2626;
  --c-green:#16a34a;
  --c-amber:#d97706;
  --radius-sm:6px;
  --radius:10px;
  --radius-lg:14px;
  --shadow-sm:0 1px 2px rgba(0,0,0,.05);
  --shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06);
  --shadow-lg:0 10px 15px rgba(0,0,0,.1),0 4px 6px rgba(0,0,0,.05);
  --font:-apple-system,'DM Sans',BlinkMacSystemFont,'Segoe UI',sans-serif;
  --sb-width:240px;
}

body{font-family:var(--font);background:var(--c-bg);color:var(--c-text);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}

/* ── Shell ── */
.shell{display:flex;height:100vh;overflow:hidden}

/* ── Sidebar (PC) ── */
.sb{
  width:var(--sb-width);flex-shrink:0;
  background:var(--c-surface);
  border-right:1px solid var(--c-border);
  display:flex;flex-direction:column;
  position:fixed;top:0;left:0;height:100vh;
  z-index:50;overflow-y:auto;
  transition:transform .22s cubic-bezier(.4,0,.2,1);
}

.sb-logo{
  display:flex;align-items:center;gap:10px;
  padding:20px 20px 16px;cursor:pointer;
  text-decoration:none;
}
.sb-logo-icon{width:32px;height:32px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-logo-icon img{height:28px;width:auto;object-fit:contain}
.sb-logo-text{
  font-size:15px;font-weight:600;color:var(--c-text);
  letter-spacing:.5px;font-family:var(--font);
}

/* New event button */
.create-btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  margin:0 16px 16px;padding:9px 16px;
  background:var(--c-blue);color:#fff;
  border-radius:var(--radius);border:none;cursor:pointer;
  font-size:13px;font-weight:500;font-family:var(--font);
  width:calc(100% - 32px);
  transition:background .15s,box-shadow .15s;
  box-shadow:0 1px 2px rgba(37,99,235,.3);
}
.create-btn:hover{background:var(--c-blue-dark)}
.create-btn-plus{font-size:18px;line-height:1;margin-top:-1px}

/* Mini calendar */
.mini-cal{padding:0 12px 12px}
.mini-cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;padding:0 4px}
.mini-cal-title{font-size:12px;font-weight:600;color:var(--c-text2)}
.mini-cal-nav{width:22px;height:22px;border:none;background:none;cursor:pointer;border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--c-text3);font-size:14px}
.mini-cal-nav:hover{background:var(--c-surface2);color:var(--c-text)}
.mini-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:0}
.mini-cal-dn{font-size:10px;color:var(--c-text3);text-align:center;padding:3px 0;font-weight:500}
.mini-cal-cell{
  width:26px;height:26px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;cursor:pointer;color:var(--c-text2);
  margin:1px auto;transition:background .1s;
}
.mini-cal-cell:hover{background:var(--c-surface2)}
.mini-cal-cell.today{background:var(--c-blue);color:#fff;font-weight:600}
.mini-cal-cell.other{color:var(--c-text3)}
.mini-cal-cell.has-ev::after{content:'';width:3px;height:3px;border-radius:50%;background:var(--c-blue);display:block;margin:-2px auto 0}

/* Divider */
.sb-divider{height:1px;background:var(--c-border);margin:8px 16px}

/* Sidebar nav */
.sb-nav-item{
  display:flex;align-items:center;gap:10px;
  padding:8px 16px;border-radius:var(--radius-sm);
  cursor:pointer;font-size:13px;color:var(--c-text2);
  width:calc(100% - 16px);margin:1px 8px;
  border:none;background:none;text-align:left;
  font-family:var(--font);font-weight:400;
  transition:background .1s,color .1s;
  position:relative;
}
.sb-nav-item:hover{background:var(--c-surface2);color:var(--c-text)}
.sb-nav-item.on{background:var(--c-blue-light);color:var(--c-blue);font-weight:500}
.sb-nav-icon{font-size:15px;width:18px;text-align:center;flex-shrink:0;opacity:.75}
.sb-nav-item.on .sb-nav-icon{opacity:1}

.sb-section{
  font-size:10px;font-weight:600;color:var(--c-text3);
  padding:10px 24px 4px;
  text-transform:uppercase;letter-spacing:.08em;
}

.sb-proj-item{
  display:flex;align-items:center;gap:8px;
  padding:6px 16px 6px 24px;cursor:pointer;
  font-size:12px;color:var(--c-text2);
  border:none;background:none;width:100%;text-align:left;
  border-radius:var(--radius-sm);
  margin:0 0 1px;font-family:var(--font);
  transition:background .1s,color .1s;
}
.sb-proj-item:hover{background:var(--c-surface2);color:var(--c-text)}
.sb-proj-item.on{color:var(--c-blue);font-weight:500}
.proj-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* ── Main ── */
.main{margin-left:var(--sb-width);flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* Topbar */
.topbar{
  display:flex;align-items:center;gap:8px;
  padding:0 20px;
  border-bottom:1px solid var(--c-border);
  background:var(--c-surface);
  flex-shrink:0;height:56px;
  position:sticky;top:0;z-index:20;
}
.hbg{
  display:none;width:36px;height:36px;border:none;
  background:none;cursor:pointer;border-radius:var(--radius-sm);
  font-size:18px;color:var(--c-text2);flex-shrink:0;
}
.hbg:hover{background:var(--c-surface2)}
.topbar-title{font-size:16px;font-weight:600;color:var(--c-text);flex:1}
.topbar-btn{
  height:32px;padding:0 12px;border-radius:var(--radius-sm);
  border:1px solid var(--c-border);background:var(--c-surface);
  color:var(--c-text2);font-size:13px;cursor:pointer;
  display:flex;align-items:center;gap:5px;font-family:var(--font);
  transition:background .1s,border-color .1s;white-space:nowrap;
}
.topbar-btn:hover{background:var(--c-surface2);border-color:var(--c-border2)}
.topbar-btn-primary{
  background:var(--c-blue);color:#fff;border-color:var(--c-blue);
}
.topbar-btn-primary:hover{background:var(--c-blue-dark);border-color:var(--c-blue-dark)}
.view-tabs{
  display:flex;border:1px solid var(--c-border);
  border-radius:var(--radius-sm);overflow:hidden;
  background:var(--c-surface2);padding:2px;gap:2px;
}
.view-tab{
  padding:4px 12px;font-size:12px;cursor:pointer;
  border:none;background:none;color:var(--c-text2);
  border-radius:4px;font-family:var(--font);font-weight:400;
  transition:background .1s,color .1s;
}
.view-tab:hover{color:var(--c-text)}
.view-tab.on{background:var(--c-surface);color:var(--c-text);font-weight:500;box-shadow:var(--shadow-sm)}

/* ── Content area ── */
.ct{flex:1;overflow:auto;background:var(--c-surface)}

/* ── Calendar Week View ── */
.gcal-day-col-header{
  text-align:center;padding:10px 4px 8px;
  border-bottom:1px solid var(--c-border);
  border-left:1px solid var(--c-border);
  position:sticky;top:0;background:var(--c-surface);z-index:10;cursor:pointer;
}
.gcal-day-col-header:hover{background:var(--c-surface2)}
.gcal-day-name{font-size:10px;color:var(--c-text3);font-weight:500;letter-spacing:.06em;text-transform:uppercase}
.gcal-day-num{
  font-size:22px;font-weight:300;color:var(--c-text);
  width:40px;height:40px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;margin:4px auto 0;
}
.gcal-day-col-header.today .gcal-day-num{background:var(--c-blue);color:#fff;font-weight:500}

/* Time gutter */
.gcal-time-slot{
  height:48px;display:flex;align-items:flex-start;
  justify-content:flex-end;padding:4px 8px 0;
  font-size:10px;color:var(--c-text3);font-weight:400;
  border-bottom:1px solid var(--c-surface2);
}
.gcal-day-col{position:relative;border-left:1px solid var(--c-border)}

/* Events */
.gcal-event{
  position:absolute;border-radius:var(--radius-sm);
  padding:3px 7px;font-size:11px;font-weight:500;
  cursor:pointer;overflow:hidden;z-index:5;
  border-left:3px solid rgba(0,0,0,.15);
  transition:filter .1s;
}
.gcal-event:hover{filter:brightness(.95)}
.gcal-event-title{font-size:12px;font-weight:600;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gcal-event-time{font-size:10px;opacity:.8;margin-top:1px}

/* Month View */
.gcal-month{display:grid;grid-template-columns:repeat(7,1fr);height:100%;overflow:auto}
.gcal-month-dname{
  text-align:center;padding:8px;
  font-size:10px;font-weight:600;color:var(--c-text3);
  text-transform:uppercase;letter-spacing:.06em;
  border-bottom:1px solid var(--c-border);
  position:sticky;top:0;background:var(--c-surface);z-index:5;
}
.gcal-month-cell{
  border-right:1px solid var(--c-border);
  border-bottom:1px solid var(--c-border);
  padding:6px;min-height:100px;cursor:pointer;
  transition:background .1s;
}
.gcal-month-cell:hover{background:var(--c-surface2)}
.gcal-month-cell.today{background:#eff6ff}
.gcal-month-num{
  font-size:12px;font-weight:400;color:var(--c-text);
  width:24px;height:24px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;margin-bottom:3px;
}
.gcal-month-cell.today .gcal-month-num{background:var(--c-blue);color:#fff;font-weight:600}
.gcal-month-cell.other .gcal-month-num{color:var(--c-text3)}
.gcal-month-ev{
  font-size:11px;font-weight:500;padding:2px 6px;
  border-radius:4px;margin-bottom:1px;cursor:pointer;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff;
}
.gcal-month-more{font-size:11px;color:var(--c-blue);padding:1px 6px;cursor:pointer}

/* Event popup */
.ev-popup{
  background:var(--c-surface);border-radius:var(--radius-lg);
  box-shadow:0 20px 40px rgba(0,0,0,.15),0 0 0 1px var(--c-border);
  width:340px;max-width:95vw;overflow:hidden;
}
.ev-popup-header{padding:14px 16px;display:flex;align-items:center;gap:10px}
.ev-popup-title{font-size:15px;font-weight:600;flex:1;color:var(--c-text)}
.ev-popup-actions{display:flex;gap:2px;margin-left:auto}
.ev-popup-action{
  width:32px;height:32px;border:none;background:none;
  cursor:pointer;border-radius:var(--radius-sm);
  display:flex;align-items:center;justify-content:center;
  font-size:15px;color:var(--c-text2);
}
.ev-popup-action:hover{background:var(--c-surface2)}
.ev-popup-body{padding:2px 16px 14px}
.ev-popup-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px;font-size:13px;color:var(--c-text2)}
.ev-popup-icon{font-size:15px;width:18px;text-align:center;flex-shrink:0;margin-top:1px}
.ev-popup-footer{padding:10px 16px;border-top:1px solid var(--c-border);display:flex;gap:8px}
.gcbtn{
  display:flex;align-items:center;gap:6px;padding:6px 12px;
  border:1px solid var(--c-border);border-radius:var(--radius-sm);
  background:var(--c-surface);font-size:12px;color:var(--c-text2);
  cursor:pointer;text-decoration:none;font-family:var(--font);
  transition:background .1s;
}
.gcbtn:hover{background:var(--c-surface2)}

/* Attendee chips */
.att-chip{
  display:inline-flex;align-items:center;gap:5px;
  padding:5px 10px 5px 5px;border-radius:20px;
  cursor:pointer;border:1.5px solid transparent;font-size:12px;
  user-select:none;transition:border-color .1s;
}
.att-chip.sel{border-color:var(--c-text)}
.att-chip-check{
  width:14px;height:14px;border-radius:50%;border:1.5px solid rgba(0,0,0,.2);
  display:flex;align-items:center;justify-content:center;
  font-size:9px;margin-left:2px;flex-shrink:0;
}
.att-chip.sel .att-chip-check{background:var(--c-text);border-color:var(--c-text);color:#fff}
.col-dot{width:20px;height:20px;border-radius:50%;cursor:pointer;border:3px solid transparent;flex-shrink:0}
.col-dot.sel{border-color:var(--c-text);transform:scale(1.15)}

/* Legend */
.gcal-legend{
  display:flex;gap:14px;flex-wrap:wrap;
  padding:6px 20px;border-top:1px solid var(--c-border);
  background:var(--c-surface);font-size:11px;color:var(--c-text2);
}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* Tasks Board */
.board{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;padding:20px}
.col-hd{font-size:12px;font-weight:600;color:var(--c-text2);margin-bottom:10px;display:flex;align-items:center;gap:8px;text-transform:uppercase;letter-spacing:.05em}
.col-badge{font-size:10px;padding:1px 7px;border-radius:10px;font-weight:600}
.tk-card{
  background:var(--c-surface);
  border:1px solid var(--c-border);border-radius:var(--radius);
  padding:14px;margin-bottom:8px;cursor:pointer;
  transition:box-shadow .15s,border-color .15s;
}
.tk-card:hover{box-shadow:var(--shadow);border-color:var(--c-border2)}
.tktag{font-size:10px;padding:2px 8px;border-radius:4px;font-weight:600;display:inline-block;margin-bottom:6px}
.tkdue{font-size:11px;color:var(--c-text3)}
.tkdue.over{color:var(--c-red)}
.mem-row{display:flex;gap:10px;flex-wrap:wrap;padding:16px 20px 0}
.mem-c{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;background:var(--c-surface);
  border:1px solid var(--c-border);border-radius:var(--radius);
}

/* Files */
.file-area{padding:20px}
.fg{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.fc{
  background:var(--c-surface);border:1px solid var(--c-border);
  border-radius:var(--radius);padding:14px;text-align:center;
  cursor:pointer;position:relative;transition:box-shadow .15s,border-color .15s;
}
.fc:hover{box-shadow:var(--shadow);border-color:var(--c-border2)}
.fdel{
  position:absolute;top:6px;right:8px;font-size:12px;
  color:var(--c-text3);cursor:pointer;border:none;background:none;
  width:22px;height:22px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
}
.fdel:hover{background:var(--c-surface2);color:var(--c-red)}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px;backdrop-filter:blur(2px)}
.modal{
  background:var(--c-surface);border-radius:var(--radius-lg);
  padding:24px;width:440px;max-width:100%;max-height:92vh;
  overflow-y:auto;
  box-shadow:0 25px 50px rgba(0,0,0,.2),0 0 0 1px var(--c-border);
}
.modal h3{font-size:15px;font-weight:600;margin-bottom:18px;color:var(--c-text)}
.field{margin-bottom:14px}
.field label{
  font-size:10px;color:var(--c-text3);display:block;
  margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;
}
.field input,.field select,.field textarea{
  width:100%;font-size:13px;padding:8px 11px;
  border:1px solid var(--c-border);border-radius:var(--radius-sm);
  background:var(--c-surface);color:var(--c-text);font-family:var(--font);
  transition:border-color .15s,box-shadow .15s;
}
.field input:focus,.field select:focus,.field textarea:focus{
  outline:none;border-color:var(--c-blue);
  box-shadow:0 0 0 3px rgba(37,99,235,.1);
}
.field textarea{resize:vertical;min-height:72px;line-height:1.5}
.ma{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;flex-wrap:wrap}
.btn{
  height:34px;padding:0 14px;border-radius:var(--radius-sm);
  border:1px solid var(--c-border);background:var(--c-surface);
  color:var(--c-text2);font-size:13px;cursor:pointer;font-family:var(--font);
  transition:background .1s,border-color .1s;
}
.btn:hover{background:var(--c-surface2)}
.btn-primary{background:var(--c-blue);color:#fff;border-color:var(--c-blue)}
.btn-primary:hover{background:var(--c-blue-dark)}
.btn-danger{color:var(--c-red);border-color:#fca5a5}
.btn-danger:hover{background:#fef2f2}

/* Login */
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--c-bg);padding:16px}
.login-card{
  background:var(--c-surface);border-radius:var(--radius-lg);
  padding:40px;width:380px;max-width:100%;
  box-shadow:0 1px 3px rgba(0,0,0,.08),0 0 0 1px var(--c-border);
}
.login-logo{font-size:22px;font-weight:700;color:var(--c-text);margin-bottom:6px;letter-spacing:-.3px}
.login-sub{font-size:13px;color:var(--c-text2);margin-bottom:28px;line-height:1.5}
.login-tabs{display:flex;gap:0;border-bottom:1px solid var(--c-border);margin-bottom:24px}
.ltab{
  flex:1;padding:10px;font-size:13px;text-align:center;
  cursor:pointer;border:none;background:none;color:var(--c-text2);
  border-bottom:2px solid transparent;margin-bottom:-1px;
  font-family:var(--font);font-weight:400;transition:color .1s;
}
.ltab.on{color:var(--c-blue);border-bottom-color:var(--c-blue);font-weight:600}
.err-msg{font-size:12px;color:var(--c-red);margin-top:6px}

/* Toast */
.toast{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
  background:var(--c-text);color:#fff;font-size:13px;
  padding:10px 20px;border-radius:var(--radius);
  z-index:9999;opacity:0;transition:opacity .25s;
  pointer-events:none;white-space:nowrap;
  box-shadow:var(--shadow-lg);
}
.toast.show{opacity:1}

/* Sidebar overlay */
.sbo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:49;backdrop-filter:blur(1px)}

/* Upload progress */
.upload-progress{height:3px;background:var(--c-surface2);border-radius:2px;overflow:hidden;margin-top:6px}
.upload-bar{height:100%;background:var(--c-blue);border-radius:2px;transition:width .2s}

/* Tags */
.tag-list{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.tag-item{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500}

/* Comments */
.comment-wrap{border-top:1px solid var(--c-border);margin-top:16px;padding-top:14px}
.comment-list{max-height:240px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;margin-bottom:12px}
.comment-list::-webkit-scrollbar{width:3px}
.comment-list::-webkit-scrollbar-thumb{background:var(--c-border);border-radius:2px}
.msg-row{display:flex;gap:8px;align-items:flex-end}
.msg-row.me{flex-direction:row-reverse}
.msg-bubble{max-width:75%;padding:8px 12px;border-radius:16px;font-size:13px;line-height:1.5;word-break:break-word}
.msg-bubble.them{background:var(--c-surface2);color:var(--c-text);border-bottom-left-radius:4px}
.msg-bubble.me{background:var(--c-blue);color:#fff;border-bottom-right-radius:4px}
.msg-name{font-size:10px;color:var(--c-text3);margin-bottom:3px;font-weight:600}
.msg-time{font-size:10px;opacity:.6;margin-top:2px}
.comment-input-wrap{display:flex;gap:8px;align-items:flex-end}
.comment-input{
  flex:1;font-size:13px;padding:9px 13px;

}

@media print{
  .sb,.topbar,.mobile-nav,.fab,.koban-date-tab,.koban-header button,.koban-add-row,.koban-del,.koban-timeline{display:none!important}
  .koban-wrap{padding:0}

  .koban-table td input{pointer-events:none}

}

/* ── 共有ビュー ── */
.share-shell{min-height:100vh;background:var(--c-bg)}

.share-body{max-width:900px;margin:0 auto;padding:24px}

.share-section{margin-bottom:32px}

.share-expired{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--c-text2);text-align:center;padding:24px}
.share-link-box{background:var(--c-surface2);border:1px solid var(--c-border);border-radius:var(--radius-sm);padding:10px 12px;font-size:12px;color:var(--c-text2);word-break:break-all;margin:10px 0;font-family:monospace;cursor:pointer;user-select:all}
.share-copy-btn{width:100%;padding:8px;border:1px solid var(--c-blue);border-radius:var(--radius-sm);background:var(--c-blue-light);color:var(--c-blue);font-size:13px;cursor:pointer;font-family:var(--font);font-weight:500;transition:all .15s}

.koban-wrap{padding:20px;max-width:1000px}

.koban-table{width:100%;border-collapse:collapse;border:1px solid var(--c-border);border-radius:var(--radius);overflow:hidden}
.koban-table th{background:var(--c-surface2);padding:10px 12px;text-align:left;font-size:11px;font-weight:600;color:var(--c-text2);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--c-border);white-space:nowrap}
.koban-table td{padding:10px 12px;border-bottom:1px solid var(--c-border);font-size:13px;color:var(--c-text);vertical-align:top}
.koban-table tr:last-child td{border-bottom:none}

/* スマホ縦タイムライン */
.koban-timeline{display:none;padding:16px}

}

/* FAB */

  .overlay{align-items:flex-end;padding:0}

<body>
<div id="app"><div class="login-page"><p style="color:var(--c-text3)">読み込み中...</p></div></div>
<div class="toast" id="toast"></div>
<div class="sbo" id="sbo" onclick="closeSb()"></div>

<script>
// ── Constants ──
var ECOLS=['#1a73e8','#0b8043','#d93025','#f6bf26','#8430ce','#e91e63','#039be5','#33b679'];
var MBG=['#e8f0fe','#e6f4ea','#fce8e6','#fff8e1','#f3e8fd','#fce4ec','#e1f5fe','#e2f4e8'];
var MTC=['#1a73e8','#0b8043','#d93025','#f09300','#8430ce','#e91e63','#039be5','#0b8043'];
var DEF_TAGS=[{name:'撮影',color:'#d93025'},{name:'編集',color:'#8430ce'},{name:'音響',color:'#039be5'},{name:'納品',color:'#0b8043'},{name:'クライアント',color:'#f6bf26'},{name:'その他',color:'#80868b'}];
var INVITE_CODE='ziptool2026';

var S={
  user:null,tab:'home',proj:null,
  projects:[],events:[],tasks:[],files:[],folders:[],tags:DEF_TAGS.slice(),
  notifications:[],comments:[],chat:[],koban:[],projChat:{},
  modal:null,editId:null,
  draft:{attendees:[],color:ECOLS[0]},
  calView:'week',weekOff:0,monthOff:0,
  selEvId:null,
  unsubs:[],
  shareMode:false,shareData:null
};
var _lm='login',_po={},_chatProj=null; // _chatProj: null=全体, projId=プロジェクト別

function fb(){return window._fb;}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2800);}
function v(id){var el=document.getElementById(id);return el?el.value.trim():'';}
function showErr(id,msg){var el=document.getElementById(id);if(el)el.textContent=msg;}

// ── Auth ──
function initFb(){
  fb().onAuthStateChanged(fb().auth,function(user){
    if(user){S.user=user;startListeners();}
    else{stopListeners();S.user=null;S.projects=[];S.events=[];S.tasks=[];S.files=[];render();}
  });
}
// 日本時間で今日の日付を取得
function getToday(){
  var now=new Date();
  var jst=new Date(now.getTime()+9*60*60*1000);
  return jst.toISOString().split('T')[0];
}
// 日本時間で今週の月曜日を取得
function getMondayJST(){
  var now=new Date();
  var jst=new Date(now.getTime()+9*60*60*1000);
  var dow=jst.getUTCDay();// 0=Sun
  var mondayOffset=dow===0?-6:1-dow;
  var monday=new Date(jst);
  monday.setUTCDate(jst.getUTCDate()+mondayOffset);
  return monday.toISOString().split('T')[0];
}
// Firestoreのトップレベルコレクションに直接保存
var TEAM_PREFIX='team_';  // team_events, team_tasks, team_projects, team_files

function startListeners(){
  var stops=[];
  function listen(col,key){
    var q=fb().query(fb().collection(fb().db,TEAM_PREFIX+col),fb().orderBy('createdAt','asc'));
    stops.push(fb().onSnapshot(q,function(snap){S[key]=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});render();},function(e){console.error('listen error',e);}));
  }
  listen('events','events');listen('tasks','tasks');listen('projects','projects');listen('files','files');listen('folders','folders');listen('comments','comments');listen('chat','chat');listen('koban','koban');

  // プロジェクト別チャットリスナー（プロジェクト一覧が取得された後に開始）
  function startProjChatListeners(){
    S.projects.forEach(function(p){
      var key='proj_'+p.id;
      if(S.projChat[key]!==undefined)return; // すでにリスニング中
      S.projChat[key]=[];
      var q=fb().query(fb().collection(fb().db,'proj_chat_'+p.id),fb().orderBy('createdAt','asc'));
      stops.push(fb().onSnapshot(q,function(snap){
        S.projChat[key]=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});
        render();
      },function(){}));
    });
  }
  // プロジェクトが読み込まれた後にリスナーを開始するため遅延実行
  setTimeout(startProjChatListeners, 2000);
  // 通知リスナー（自分以外が作成したもの、最新50件）
  var nq=fb().query(fb().collection(fb().db,TEAM_PREFIX+'notifications'),fb().orderBy('createdAt','desc'));
  stops.push(fb().onSnapshot(nq,function(snap){
    S.notifications=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());}).slice(0,50);
    render();
  },function(){}));
  fb().getDoc(fb().doc(fb().db,'team_settings','tags')).then(function(d){if(d.exists()&&d.data().list)S.tags=d.data().list;render();}).catch(function(){});
  S.unsubs=stops;render();
}
function stopListeners(){S.unsubs.forEach(function(u){u();});S.unsubs=[];}

function doLogin(){
  var e=v('le'),p=v('lp');
  fb().signInWithEmailAndPassword(fb().auth,e,p).catch(function(err){showErr('aerr',jpErr(err));});
}
function doReg(){
  var n=v('rn'),e=v('re'),p=v('rp'),code=v('rc');
  if(!n){showErr('aerr','お名前を入力してください');return;}
  if(code!==INVITE_CODE){showErr('aerr','招待コードが違います');return;}
  if(p.length<6){showErr('aerr','パスワードは6文字以上');return;}
  fb().createUserWithEmailAndPassword(fb().auth,e,p).then(function(c){return fb().updateProfile(c.user,{displayName:n});}).catch(function(err){showErr('aerr',jpErr(err));});
}
function doLogout(){fb().signOut(fb().auth);}
function jpErr(e){
  var m={
    'auth/email-already-in-use':'このメールアドレスはすでに使用されています',
    'auth/invalid-credential':'メールアドレスまたはパスワードが違います',
    'auth/wrong-password':'メールアドレスまたはパスワードが違います',
    'auth/user-not-found':'アカウントが見つかりません',
    'auth/weak-password':'パスワードは6文字以上',
    'auth/invalid-email':'メールアドレスの形式が正しくありません'
  };
  return m[e.code]||e.message;
}
window.doLogin=doLogin;window.doReg=doReg;window.doLogout=doLogout;

// ── DB helpers ──
function dbAdd(col,data){
  var d=Object.assign({},data,{createdAt:fb().serverTimestamp(),createdBy:S.user?S.user.displayName||S.user.email:''});
  var p=fb().addDoc(fb().collection(fb().db,TEAM_PREFIX+col),d);
  var colNames={events:'予定',tasks:'タスク',files:'ファイル',projects:'プロジェクト'};
  if(colNames[col]&&S.user&&!data.fromTask&&col!=='notifications'){
    var who=S.user.displayName||S.user.email||'メンバー';
    var ttl=data.title||data.name||'';
    fb().addDoc(fb().collection(fb().db,TEAM_PREFIX+'notifications'),{
      text:who+'が'+colNames[col]+'「'+ttl+'」を追加しました',
      type:col,from:who,readBy:[S.user.uid],createdAt:fb().serverTimestamp()
    });
  }
  return p;
}
function dbUp(col,id,data){return fb().updateDoc(fb().doc(fb().db,TEAM_PREFIX+col,id),data);}
function dbDel(col,id){return fb().deleteDoc(fb().doc(fb().db,TEAM_PREFIX+col,id));}
function saveTags(){return fb().setDoc(fb().doc(fb().db,'team_settings','tags'),{list:S.tags});}

function unreadCount(){
  if(!S.user)return 0;
  var uid=S.user.uid;
  return S.notifications.filter(function(n){return !(n.readBy||[]).includes(uid);}).length;
}
function markAllRead(){
  if(!S.user)return;
  var uid=S.user.uid;
  S.notifications.filter(function(n){return !(n.readBy||[]).includes(uid);}).forEach(function(n){
    var newRead=(n.readBy||[]).concat(uid);
    dbUp('notifications',n.id,{readBy:newRead});
  });
}

// ── Helpers ──
function avBg(name){if(!name)return{bg:MBG[0],tc:MTC[0]};var h=0;for(var i=0;i<name.length;i++)h=(h*31+name.charCodeAt(i))%MBG.length;return{bg:MBG[h],tc:MTC[h]};}
function avEl(name,s){s=s||26;var c=avBg(name||'?');return '<div style="width:'+s+'px;height:'+s+'px;border-radius:50%;background:'+c.bg+';color:'+c.tc+';display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;font-size:'+Math.floor(s*.4)+'px" title="'+(name||'?')+'">'+(name||'?')[0]+'</div>';}
function tagInfo(name){return S.tags.find(function(t){return t.name===name;})||{name:name,color:'#80868b'};}
function tagEl(name){var t=tagInfo(name);return '<span class="tktag" style="background:'+t.color+'20;color:'+t.color+'">'+name+'</span>';}
function fmtDate(d){if(!d)return '';var p=d.split('-');return parseInt(p[1])+'/'+parseInt(p[2]);}
function dayName(date){try{return['日','月','火','水','木','金','土'][new Date(date+'T00:00:00').getDay()];}catch(e){return '';}}
function calcDur(s,e){if(!s||!e)return '';var sh=parseInt(s),sm=parseInt(s.split(':')[1]||0),eh=parseInt(e),em=parseInt(e.split(':')[1]||0),m=(eh*60+em)-(sh*60+sm);if(m<=0)return '';return m>=60?Math.floor(m/60)+'時間'+(m%60?m%60+'分':''):m+'分';}
function toMin(t){if(!t)return 0;var p=t.split(':');return parseInt(p[0])*60+parseInt(p[1]||0);}
function toISO(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function isOver(due){return due&&due<new Date().toISOString().split('T')[0];}
function gcalURL(ev){var d=(ev.date||'').replace(/-/g,''),s=(ev.start||'0900').replace(':',''),e=(ev.end||'1000').replace(':','');return 'https://calendar.google.com/calendar/render?action=TEMPLATE&text='+encodeURIComponent(ev.title||'')+'&dates='+d+'T'+s+'00/'+d+'T'+e+'00&details='+encodeURIComponent(ev.note||'');}
// チームメンバー固定リスト
var TEAM_MEMBERS=['坂中一平','小野龍之介','近藤世渚'];

function members(){return TEAM_MEMBERS;}

// ── Member color map ──
function getMemberColors(){
  var map={
    '坂中一平':'#2563eb',
    '小野龍之介':'#d97706',
    '近藤世渚':'#16a34a'
  };
  return map;
}

// ミニカレンダーの日付クリックでその週に飛ぶ
window.jumpToDate=function(iso){
  // その日付の月曜日を求める
  var parts=iso.split('-');
  var y=parseInt(parts[0]),m=parseInt(parts[1])-1,d=parseInt(parts[2]);
  var target=new Date(y,m,d);
  var targetDow=target.getDay(); // 0=Sun
  var targetMondayOffset=targetDow===0?-6:1-targetDow;
  var targetMonday=new Date(target);
  targetMonday.setDate(target.getDate()+targetMondayOffset);

  // 今週の月曜日を求める
  var mondayStr=getMondayJST();
  var mp=mondayStr.split('-');
  var baseMonday=new Date(parseInt(mp[0]),parseInt(mp[1])-1,parseInt(mp[2]));

  // 何週ずれているか
  var diff=Math.round((targetMonday-baseMonday)/(7*24*60*60*1000));
  S.weekOff=diff;
  S.calView='week';
  S.tab='cal';
  S.proj=null;
  S.selEvId=null;
  closeSb();
  render();
};

function setProj(id){
  S.tab='task';S.proj=id;closeSb();
  // プロジェクトチャットリスナーを開始
  if(id){
    var key='proj_'+id;
    if(S.projChat[key]===undefined){
      S.projChat[key]=[];
      var q=fb().query(fb().collection(fb().db,'proj_chat_'+id),fb().orderBy('createdAt','asc'));
      S.unsubs.push(fb().onSnapshot(q,function(snap){
        S.projChat[key]=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});
        render();
      },function(){}));

  }
  render();
}

// ── Attendees (no re-render) ──
function toggleAtt(name){
  if(S.draft.attendees.includes(name))return; // 未選択のみ追加
  S.draft.attendees.push(name);
  refreshAttUI();
}
function removeAtt(idx){
  S.draft.attendees.splice(idx,1);
  refreshAttUI();
}
function addAttManual(e){
  if(e.key!=='Enter')return;
  var nv=e.target.value.trim();
  if(nv&&!S.draft.attendees.includes(nv)){S.draft.attendees.push(nv);}
  e.target.value='';
  e.preventDefault();
  refreshAttUI();
}

function refreshAttUI(){
  // 選択済みリストを更新
  var sel=document.getElementById('att-selected');
  if(sel){
    sel.innerHTML=S.draft.attendees.map(function(n,idx){
      var c=avBg(n);
      return '<div style="display:inline-flex;align-items:center;gap:5px;padding:4px 6px 4px 5px;border-radius:20px;background:'+c.bg+';color:'+c.tc+';font-size:12px;font-weight:600;margin:3px">'+
        avEl(n,18)+'<span>'+n+'</span>'+
        '<span onclick="removeAtt('+idx+')" style="cursor:pointer;opacity:.7;font-size:14px;margin-left:2px;font-weight:400">✕</span>'+
      '</div>';
    }).join('');
  }
  // 追加できるチップを更新（選択済みは非表示）
  document.querySelectorAll('.att-chip').forEach(function(el){
    var name=el.dataset.name;
    el.style.display=S.draft.attendees.includes(name)?'none':'inline-flex';
  });
}

window.sendComment=function(taskId){
  var input=document.getElementById('comment-input');
  if(!input)return;
  var text=input.value.trim();
  if(!text)return;
  var from=S.user?S.user.displayName||S.user.email:'不明';
  fb().addDoc(fb().collection(fb().db,TEAM_PREFIX+'comments'),{
    taskId:taskId,text:text,from:from,
    createdAt:fb().serverTimestamp()
  }).then(function(){
    // 通知
    fb().addDoc(fb().collection(fb().db,TEAM_PREFIX+'notifications'),{
      text:from+'がコメントしました: 「'+text.slice(0,30)+(text.length>30?'...':'')+' 」',
      type:'comments',from:from,readBy:[S.user.uid],createdAt:fb().serverTimestamp()
    });
    // 入力欄クリア・スクロール
    input.value='';input.style.height='auto';
    setTimeout(function(){
      var list=document.getElementById('comment-list');
      if(list)list.scrollTop=list.scrollHeight;
    },300);
  });
};

  var off=S.monthOff||0;
  var now=new Date();
  var jst=new Date(now.getTime()+9*60*60*1000);

  var today=getToday();
  var evDates={};
  S.events.forEach(function(e){
    if(!e.date)return;
    var endD=e.endDate||e.date;

    while(cur<=endD){
      evDates[cur]=true;
      var p=cur.split('-');

      cur=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');

  });
  var dow=(new Date(year,month,1).getDay()+6)%7;
  var dim=new Date(year,month+1,0).getDate();

    '<button class="mini-cal-nav" onclick="event.stopPropagation();S.monthOff=(S.monthOff||0)+1;document.getElementById(\'mini-cal\').innerHTML=renderMiniCal()">›</button>'+

  ['月','火','水','木','金','土','日'].map(function(d){return '<div class="mini-cal-dn">'+d+'</div>';}).join('');
  for(var i=0;i<dow;i++)html+='<div class="mini-cal-cell other"> </div>';
  for(var d=1;d<=dim;d++){

function weekNav(dir){
  if(dir===0)S.weekOff=0;else S.weekOff=(S.weekOff||0)+dir;
  S.selEvId=null;render();

window.weekNav=weekNav;

function getWeekDays(off){
  var mondayStr=getMondayJST();
  var mp=mondayStr.split('-');
  var base=new Date(parseInt(mp[0]),parseInt(mp[1])-1,parseInt(mp[2]));
  base.setDate(base.getDate()+(off||0)*7);
  var days=[];
  for(var i=0;i<7;i++){
    var d=new Date(base.getFullYear(),base.getMonth(),base.getDate()+i);
    days.push(d);
  }
  return days;
}

function renderCal(){
  if(S.calView==='month')return renderMonthView();
  return renderWeekView();
}

function renderWeekView(){
  var mcol=getMemberColors();
  var off=S.weekOff||0;
  var days=getWeekDays(off);
  var today=getToday();
  var HOURS=[];for(var h=0;h<24;h++)HOURS.push(h);
  var evByDate={};
  S.events.forEach(function(e){
    if(!e.date)return;
    var end=e.endDate||e.date;
    // 開始日〜終了日の全日付に登録
    var cur=e.date;
    while(cur<=end){
      if(!evByDate[cur])evByDate[cur]=[];
      evByDate[cur].push(e);
      // 次の日へ
      var p=cur.split('-');
      var d=new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2])+1);
      cur=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    }
  });
  var dayNames=['月','火','水','木','金','土','日'];

  // Header row + all-day banner
  var html='<div style="display:grid;grid-template-columns:60px repeat(7,1fr);position:sticky;top:0;z-index:10;background:var(--c-surface);border-bottom:1px solid var(--c-border)">'+
    '<div style="border-right:1px solid var(--c-border);background:var(--c-surface)"></div>'+
    days.map(function(d,i){
      var iso=toISO(d);
      var isToday=iso===today;
      return '<div class="gcal-day-col-header'+(isToday?' today':'')+(evByDate[iso]&&evByDate[iso].length?' has-ev':'')+'">'+
        '<div class="gcal-day-name">'+dayNames[i]+'</div>'+
        '<div class="gcal-day-num">'+d.getDate()+'</div>'+
      '</div>';
    }).join('')+
  '</div>'+
  // 終日イベントバナー行
  '<div style="display:grid;grid-template-columns:60px repeat(7,1fr);border-bottom:1px solid var(--c-border);background:var(--c-surface);min-height:8px">'+
    '<div style="border-right:1px solid var(--c-border);font-size:9px;color:var(--c-text3);padding:2px 4px;text-align:right">終日</div>'+
    days.map(function(d){
      var iso=toISO(d);
      var allDayEvs=(evByDate[iso]||[]).filter(function(e){return e.allDay;});
      return '<div style="border-left:1px solid var(--c-border);padding:2px;min-height:8px">'+
        allDayEvs.map(function(e){
          var att=(e.attendees||[])[0];
          var color=att&&mcol[att]?mcol[att]:(e.color||'#1a73e8');
          // 開始日のみタイトル表示、それ以外は色だけ
          var showTitle=iso===e.date;
          return '<div style="background:'+color+';color:#fff;font-size:11px;font-weight:600;padding:2px 6px;border-radius:3px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer" onclick="event.stopPropagation();showEvDetail(\''+e.id+'\')">'+
            (showTitle?e.title:'')+'</div>';
        }).join('')+
      '</div>';
    }).join('')+
  '</div>';

  // Body: time gutter + day columns
  html+='<div style="display:grid;grid-template-columns:60px repeat(7,1fr);flex:1">';

  // Time gutter
  html+='<div class="gcal-time-gutter">';
  HOURS.forEach(function(h){
    html+='<div class="gcal-time-slot">'+(h===0?'':h+':00')+'</div>';
  });
  html+='</div>';

  // Day columns
  days.forEach(function(d){
    var iso=toISO(d);
    var dayEvs=(evByDate[iso]||[]).filter(function(e){return !e.allDay;}).sort(function(a,b){return toMin(a.start)-toMin(b.start);});
    html+='<div class="gcal-day-col" style="position:relative;height:'+(HOURS.length*48)+'px">';
    HOURS.forEach(function(h){
      html+='<div style="position:absolute;top:'+(h*48)+'px;left:0;right:0;height:48px;border-top:1px solid #f1f3f4">'+
        '<div style="position:absolute;top:24px;left:0;right:0;border-top:1px dashed #f1f3f4"></div>'+
      '</div>';
    });
    // 重複検出して列を割り当てる
    var columns=[];
    dayEvs.forEach(function(e){
      var startM=toMin(e.start||'09:00');
      var endM=toMin(e.end||'10:00');
      if(endM<=startM)endM=startM+30;
      var placed=false;
      for(var ci=0;ci<columns.length;ci++){
        var last=columns[ci][columns[ci].length-1];
        var lastEnd=toMin(last.end||'10:00');
        if(lastEnd<=startM){columns[ci].push(e);placed=true;break;}
      }
      if(!placed)columns.push([e]);
    });
    var totalCols=columns.length||1;
    columns.forEach(function(col,ci){
      col.forEach(function(e){
        var startM=toMin(e.start||'09:00');
        var endM=toMin(e.end||'10:00');
        if(endM<=startM)endM=startM+30;
        var top=startM/60*48;
        var height=Math.max((endM-startM)/60*48,22);
        var att=(e.attendees||[])[0];
        var color=att&&mcol[att]?mcol[att]:(e.color||'#1a73e8');
        var isSelected=S.selEvId===e.id;
        var colW=Math.floor(100/totalCols);
        var left=ci*colW;
        var width=colW-(ci<totalCols-1?2:0);
        html+='<div class="gcal-event" style="'+
          'top:'+top+'px;height:'+height+'px;'+
          'left:'+left+'%;width:'+width+'%;'+
          'background:'+color+'18;border-left-color:'+color+';color:'+color+
          (isSelected?';box-shadow:0 2px 8px rgba(0,0,0,.3)':'')+
          '" onclick="event.stopPropagation();showEvDetail(\''+e.id+'\')">'+
          '<div class="gcal-event-title">'+(e.title||'')+'</div>'+
          (height>30?'<div class="gcal-event-time">'+(e.start||'')+(e.end?' – '+e.end:'')+'</div>':'')+
        '</div>';
      });
    });
    html+='</div>';
  });
  html+='</div>';

  return '<div style="height:100%;overflow-y:auto;overflow-x:hidden" onclick="S.selEvId=null;render()">'+
    '<div class="week-scroll-wrap" style="min-width:100%">'+
      '<div style="min-width:560px">'+html+'</div>'+
    '</div>'+
  '</div>';
}

function renderMonthView(){
  var mcol=getMemberColors();
  var off=S.monthOff||0;
  var now=new Date();
  var jst=new Date(now.getTime()+9*60*60*1000);
  var baseYear=jst.getUTCFullYear(),baseMonth=jst.getUTCMonth();
  var base=new Date(baseYear,baseMonth+off,1);
  var year=base.getFullYear(),month=base.getMonth();
  var today=getToday();
  var evByDate={};
  S.events.forEach(function(e){
    if(!e.date)return;
    var endD=e.endDate||e.date;
    var cur=e.date;
    while(cur<=endD){
      if(!evByDate[cur])evByDate[cur]=[];
      evByDate[cur].push(e);
      var p=cur.split('-');
      var d=new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2])+1);
      cur=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    }
  });
  var dow=(new Date(year,month,1).getDay()+6)%7;
  var dim=new Date(year,month+1,0).getDate();
  var dn=['月','火','水','木','金','土','日'];

  var html='<div class="gcal-month" onclick="S.selEvId=null;render()">';
  dn.forEach(function(d){html+='<div class="gcal-month-dname">'+d+'</div>';});

  var prev=new Date(year,month,0).getDate();
  for(var i=dow-1;i>=0;i--){
    var pm=month===0?12:month,py=month===0?year-1:year;
    var iso=py+'-'+String(pm).padStart(2,'0')+'-'+String(prev-i).padStart(2,'0');
    html+='<div class="gcal-month-cell other"><div class="gcal-month-num">'+(prev-i)+'</div></div>';
  }
  for(var day=1;day<=dim;day++){
    var iso2=year+'-'+String(month+1).padStart(2,'0')+'-'+String(day).padStart(2,'0');
    var isToday=iso2===today;
    var evs=(evByDate[iso2]||[]).sort(function(a,b){return toMin(a.start)-toMin(b.start);});
    var shown=evs.slice(0,3),more=evs.length-3;
    html+='<div class="gcal-month-cell'+(isToday?' today':'')+'">'+
      '<div class="gcal-month-num">'+day+'</div>'+
      shown.map(function(e){
        var att=(e.attendees||[])[0];
        var c=att&&mcol[att]?mcol[att]:(e.color||'#1a73e8');
        return '<div class="gcal-month-ev" style="background:'+c+'" onclick="event.stopPropagation();showEvDetail(\''+e.id+'\')" title="'+(e.title||'')+'">'+( e.title||'')+'</div>';
      }).join('')+
      (more>0?'<div class="gcal-month-more" onclick="event.stopPropagation()">他 '+more+'件</div>':'')+
    '</div>';
  }
  var total=dow+dim;var remain=(7-total%7)%7;
  for(var j=1;j<=remain;j++){html+='<div class="gcal-month-cell other"><div class="gcal-month-num">'+j+'</div></div>';}
  html+='</div>';

  return '<div style="height:100%;overflow:auto">'+html+'</div>';
}

function fmtDateFull(iso){
  if(!iso)return '';
  var p=iso.split('-');
  var d=new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));
  var dow=['日','月','火','水','木','金','土'][d.getDay()];
  return parseInt(p[0])+'年'+parseInt(p[1])+'月'+parseInt(p[2])+'日（'+dow+'）';
}
function fmtTimeAgo(ts){
  if(!ts||!ts.toDate)return 'たった今';
  var diff=Date.now()-ts.toDate().getTime();
  var m=Math.floor(diff/60000);
  if(m<1)return 'たった今';
  if(m<60)return m+'分前';
  var h=Math.floor(m/60);
  if(h<24)return h+'時間前';
  return Math.floor(h/24)+'日前';
}

function getFileType(name,mime){
  if(mime){if(mime.startsWith('video/'))return 'video';if(mime.startsWith('audio/'))return 'audio';if(mime.startsWith('image/'))return 'image';}
  var ext=(name||'').split('.').pop().toLowerCase();
  if(['mp4','mov','avi','mkv'].includes(ext))return 'video';
  if(['mp3','wav','aiff','aac'].includes(ext))return 'audio';
  if(['jpg','jpeg','png','gif','webp'].includes(ext))return 'image';
  if(ext==='pdf')return 'pdf';
  if(['doc','docx'].includes(ext))return 'doc';
  if(['xls','xlsx','csv'].includes(ext))return 'sheet';
  return 'other';
}
function fmtSize(b){if(b<1024)return b+'B';if(b<1048576)return (b/1024).toFixed(1)+' KB';if(b<1073741824)return (b/1048576).toFixed(1)+' MB';return (b/1073741824).toFixed(2)+' GB';}

window.handleFileSelect=function(input){
  var files=Array.from(input.files);input.value='';if(!files.length)return;
  var now=new Date(),dateStr=(now.getMonth()+1)+'/'+(now.getDate());
  files.forEach(function(file){
    var type=getFileType(file.name,file.type);
    var storagePath='team/files/'+Date.now()+'_'+file.name;
    var tempId='tmp_'+Date.now()+Math.random();
    S.files.push({id:tempId,name:file.name,type:type,size:fmtSize(file.size),date:dateStr,uploading:true,progress:0,url:'',storagePath:storagePath});
    render();
    var storageRef=fb().ref(fb().storage,storagePath);
    var task=fb().uploadBytesResumable(storageRef,file);
    task.on('state_changed',
      function(snap){var pct=Math.round(snap.bytesTransferred/snap.totalBytes*100);var f=S.files.find(function(x){return x.id===tempId;});if(f){f.progress=pct;}},
      function(){S.files=S.files.filter(function(f){return f.id!==tempId;});render();toast('アップロードに失敗しました');},
      function(){
        fb().getDownloadURL(task.snapshot.ref).then(function(url){
          S.files=S.files.filter(function(f){return f.id!==tempId;});
          dbAdd('files',{name:file.name,type:type,size:fmtSize(file.size),date:dateStr,url:url,storagePath:storagePath,folderId:_currentFolder||null});
          toast('「'+file.name+'」をアップロードしました');
        });
      }
    );
  });
};

window.delFile=function(id,sp){

};

// ── 香盤表 ──
var _kobanDate=null;

function renderKoban(){
  var rows=S.koban||[];
  var today=getToday();
  var dates=Array.from(new Set(rows.map(function(r){return r.date;}).filter(Boolean))).sort();
  if(!dates.length)dates=[today];
  if(!_kobanDate||dates.indexOf(_kobanDate)<0)_kobanDate=dates[0];
  var dayRows=rows.filter(function(r){return r.date===_kobanDate;}).sort(function(a,b){return (a.startTime||'').localeCompare(b.startTime||'');});
  var nowJST=new Date(new Date().getTime()+9*60*60*1000);
  var nowMin=nowJST.getUTCHours()*60+nowJST.getUTCMinutes();
  function toM(t){if(!t)return -1;var p=t.split(':');return parseInt(p[0])*60+(parseInt(p[1])||0);}

  var html='<div class="koban-wrap">';

  // 印刷用ヘッダー
  var proj=S.kobanProj?S.projects.find(function(p){return p.id===S.kobanProj;}):null;
  html+='<div class="koban-print-header">'+
    '<div class="koban-print-title">'+(proj?proj.name+' ':'')+'香盤表</div>'+
    '<div class="koban-print-meta">日付: '+fmtDateFull(_kobanDate||today)+'　出力: '+fmtDateFull(today)+'</div>'+
  '</div>';
  html+='<div class="koban-header">'+
    '<span class="koban-title">香盤表</span>'+
    (S.projects.length?
      '<select onchange="S.kobanProj=this.value;render()" style="font-size:13px;padding:6px 10px;border:1px solid var(--c-border);border-radius:var(--radius-sm);background:var(--c-surface);color:var(--c-text);font-family:var(--font)">'+
        '<option value="">プロジェクト選択...</option>'+
        S.projects.map(function(p){return '<option value="'+p.id+'"'+(S.kobanProj===p.id?' selected':'')+'>'+p.name+'</option>';}).join('')+
      '</select>'
    :'')+
  '</div>';
  html+='<div class="koban-date-tab">'+
    dates.map(function(d){return '<button class="kdt'+(d===_kobanDate?' on':'')+'" onclick="_kobanDate=\''+d+'\';render()">'+fmtDateFull(d)+'</button>';}).join('')+
    '<button class="kdt" onclick="addKobanDate()" style="border-style:dashed">＋ 日付追加</button>'+
  '</div>';

  // PC テーブル
  html+='<table class="koban-table"><thead><tr><th style="width:72px">開始</th><th style="width:72px">終了</th><th>内容</th><th>場所</th><th>担当</th><th>備考</th><th style="width:36px"></th></tr></thead><tbody>';
  if(!dayRows.length){
    html+='<tr><td colspan="7" style="text-align:center;padding:32px;color:var(--c-text3)">行がありません。右上のボタンで追加してください。</td></tr>';
  }
  dayRows.forEach(function(r){
    var isNow=_kobanDate===today&&toM(r.startTime)<=nowMin&&(toM(r.endTime)<0||nowMin<toM(r.endTime));
    html+='<tr class="'+(isNow?'koban-row-now':'')+'">'+
      '<td><input value="'+(r.startTime||'')+'" type="time" onchange="saveKobanCell(\''+r.id+'\',\'startTime\',this.value)"/></td>'+
      '<td><input value="'+(r.endTime||'')+'" type="time" onchange="saveKobanCell(\''+r.id+'\',\'endTime\',this.value)"/></td>'+
      '<td><input value="'+(r.content||'')+'" placeholder="撮影・搬入など" onchange="saveKobanCell(\''+r.id+'\',\'content\',this.value)"/></td>'+
      '<td><input value="'+(r.place||'')+'" placeholder="スタジオA" onchange="saveKobanCell(\''+r.id+'\',\'place\',this.value)"/></td>'+
      '<td><input value="'+(Array.isArray(r.who)?r.who.join('・'):r.who||'')+'" placeholder="担当者" onchange="saveKobanCell(\''+r.id+'\',\'who\',this.value)"/></td>'+
      '<td><input value="'+(r.note||'')+'" placeholder="メモ" onchange="saveKobanCell(\''+r.id+'\',\'note\',this.value)"/></td>'+
      '<td><button class="koban-del" onclick="delKobanRow(\''+r.id+'\')">✕</button></td>'+
    '</tr>';
  });
  html+='</tbody></table>';
  html+='<button class="koban-add-row" onclick="openModal(\'kobanRow\')">＋ 行を追加</button>';

  // スマホ縦タイムライン
  html+='<div class="koban-timeline">';
  if(!dayRows.length){
    html+='<div style="text-align:center;color:var(--c-text3);padding:32px 0">行がありません</div>';
  }
  dayRows.forEach(function(r){
    var isNow=_kobanDate===today&&toM(r.startTime)<=nowMin&&(toM(r.endTime)<0||nowMin<toM(r.endTime));
    html+='<div class="ktl-item">'+
      '<div class="ktl-time"><div class="ktl-time-start">'+(r.startTime||'')+'</div><div class="ktl-time-end">'+(r.endTime||'')+'</div></div>'+
      '<div class="ktl-dot'+(isNow?' now':'')+'"></div>'+
      '<div class="ktl-card'+(isNow?' now':'')+'">'+
        '<div class="ktl-content">'+(r.content||'未定')+'</div>'+
        '<div class="ktl-meta">'+(r.place?'📍'+r.place+'　':'')+(r.who?'👤'+(Array.isArray(r.who)?r.who.join('・'):r.who):'')+'</div>'+
        (r.note?'<div style="font-size:11px;color:var(--c-text3);margin-top:3px">'+r.note+'</div>':'')+
        (isNow?'<div style="font-size:11px;font-weight:600;color:var(--c-amber);margin-top:4px">▶ 進行中</div>':'')+
      '</div>'+
    '</div>';
  });
  html+='</div></div>';
  return html;
}

// ── 共有リンク ──
function genToken(){
  var chars='ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789';
  var t='';for(var i=0;i<20;i++)t+=chars[Math.floor(Math.random()*chars.length)];
  return t;
}
window.genShareLink=function(projId){
  var label=v('sh-label')||'共有リンク';
  var days=parseInt(document.getElementById('sh-expires').value);
  var token=genToken();
  var data={projectId:projId,label:label,createdBy:S.user?S.user.displayName||S.user.email:'',createdAt:fb().serverTimestamp()};
  if(days>0){
    var exp=new Date();exp.setDate(exp.getDate()+days);
    data.expiresAt=fb().serverTimestamp();
    // FirestoreのserverTimestampは書き込み後に確定するため、クライアント側でDateも保持
    data.expiresDate=exp.toISOString();
  }
  fb().setDoc(fb().doc(fb().db,'team_shares',token),data).then(function(){
    var url=window.location.origin+window.location.pathname+'?share='+token;
    var el=document.getElementById('sh-link');
    if(el){el.textContent=url;el.dataset.url=url;}
    var res=document.getElementById('sh-result');
    if(res)res.style.display='block';
    var btn=document.getElementById('sh-gen-btn');
    if(btn){btn.textContent='再生成';btn.style.background='var(--c-surface2)';btn.style.color='var(--c-text2)';}
    toast('共有リンクを生成しました');
  });
};
window.copyShareLink=function(){
  var el=document.getElementById('sh-link');
  if(!el)return;
  var url=el.dataset.url||el.textContent;
  if(navigator.clipboard){
    navigator.clipboard.writeText(url).then(function(){toast('コピーしました！');});
  }else{
    var ta=document.createElement('textarea');ta.value=url;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast('コピーしました！');
  }
};


window.toggleKbWho=function(el){
  var name=el.dataset.name;
  if(_kbWho.includes(name)){
    _kbWho=_kbWho.filter(function(n){return n!==name;});
    el.style.opacity='1';el.style.outline='none';
  } else {
    _kbWho.push(name);
    el.style.outline='2px solid #2563eb';el.style.opacity='.85';
  }
};
window.saveKobanRow=function(){
  var date=v('kb-date'),start=v('kb-start'),end=v('kb-end'),content=v('kb-content'),place=v('kb-place'),note=v('kb-note');
  if(!date)return;
  _kobanDate=date;
  dbAdd('koban',{date:date,startTime:start,endTime:end,content:content,place:place,who:_kbWho.slice(),note:note,projectId:S.kobanProj||''});

var _taskWho=[];

function initTaskWho(tk){
  if(!tk){_taskWho=[];return;}
  _taskWho=Array.isArray(tk.who)?tk.who.slice():(tk.who?[tk.who]:[]);
}

window.addTaskWho=function(name){
  if(_taskWho.includes(name))return;
  _taskWho.push(name);
  refreshTaskWhoUI();
};
window.removeTaskWho=function(idx){
  _taskWho.splice(idx,1);
  refreshTaskWhoUI();
};

function refreshTaskWhoUI(){
  var sel=document.getElementById('task-who-selected');
  if(sel){
    sel.innerHTML=_taskWho.map(function(n,i){
      var c=avBg(n);
      return '<div style="display:inline-flex;align-items:center;gap:5px;padding:4px 8px 4px 5px;border-radius:20px;background:'+c.bg+';color:'+c.tc+';font-size:12px;font-weight:600">'+
        avEl(n,18)+'<span>'+n+'</span>'+
        '<span onclick="removeTaskWho('+i+')" style="cursor:pointer;opacity:.7;margin-left:2px">✕</span></div>';
    }).join('');
  }
  document.querySelectorAll('.task-who-chip').forEach(function(el){
    el.style.display=_taskWho.includes(el.dataset.name)?'none':'inline-flex';
  });
}


function openModal(m,id){
  S.modal=m;S.editId=id||null;
  if(m==='event'){var ev=id?S.events.find(function(e){return e.id===id;}):null;S.draft.attendees=ev?[].concat(ev.attendees||[]):[];S.draft.color=ev?ev.color||ECOLS[0]:ECOLS[0];}
  else if(m==='task'||m==='taskDetail'){var tk=id?S.tasks.find(function(t){return t.id===id;}):null;initTaskWho(tk);S.draft.color=ECOLS[0];}
  else if(m==='project'){var ep=id?S.projects.find(function(p){return p.id===id;}):null;S.draft.color=ep?ep.color||ECOLS[0]:ECOLS[0];}
  else S.draft.color=ECOLS[0];

// ── Save functions ──
function saveEvent(){
  var title=v('m-title'),date=v('m-date'),endDate=v('m-enddate'),note=v('m-note');
  if(!title||!date)return;
  if(!endDate||endDate<date)endDate=date;
  var allDay=!!(document.getElementById('m-allday')&&document.getElementById('m-allday').checked);
  var start=allDay?'':v('m-start');
  var end=allDay?'':v('m-end');
  var manual=v('m-att-m');var atts=[].concat(S.draft.attendees);if(manual&&!atts.includes(manual))atts.push(manual);
  var data={title:title,date:date,endDate:endDate,start:start,end:end,allDay:allDay,note:note,attendees:atts,color:S.draft.color,fromTask:false};
  if(S.editId)dbUp('events',S.editId,data);else dbAdd('events',data);
  closeModal();
}
function delEvent(id){dbDel('events',id);S.selEvId=null;render();}
window.saveEvent=saveEvent;window.delEvent=delEvent;

function saveTask(){
  var title=v('m-title'),desc=v('m-desc'),projectId=v('m-proj'),status=v('m-status'),due=v('m-due'),tag=v('m-tag');
  if(!title)return;
  var who=_taskWho.slice();
  dbAdd('tasks',{title:title,desc:desc,who:who,projectId:projectId,status:status,due:due,tag:tag}).then(function(ref){
    var proj=S.projects.find(function(p){return p.id===projectId;});
    var tagColor=(S.tags.find(function(t){return t.name===tag;})||{}).color||'#1a73e8';
    dbAdd('events',{title:'【期日】'+title,date:due,start:'09:00',end:'09:30',attendees:who,color:tagColor,note:'担当: '+who.join('・')+(proj?' ／ '+proj.name:''),fromTask:true,taskId:ref.id});
    toast('📅「'+title+'」をスケジュールに追加しました');
  });
  closeModal();
}
function saveTaskDetail(id){
  var title=v('m-title'),desc=v('m-desc'),status=v('m-status'),due=v('m-due'),tag=v('m-tag'),projectId=v('m-proj');
  var tk=S.tasks.find(function(t){return t.id===id;});if(!tk)return;
  var who=_taskWho.slice();
  dbUp('tasks',id,{title:title,desc:desc,who:who,status:status,due:due,tag:tag,projectId:projectId});
  var ev=S.events.find(function(e){return e.fromTask&&e.taskId===id;});
  if(ev&&due!==tk.due){dbUp('events',ev.id,{title:'【期日】'+title,date:due,attendees:who});toast('📅 スケジュールの期日も更新しました');}
  closeModal();
}
function delTask(id){
  dbDel('tasks',id);
  var ev=S.events.find(function(e){return e.fromTask&&e.taskId===id;});if(ev)dbDel('events',ev.id);
  closeModal();
}
window.saveTask=saveTask;window.saveTaskDetail=saveTaskDetail;window.delTask=delTask;

window.deleteProject=function(id){
  var proj=S.projects.find(function(p){return p.id===id;});
  if(!confirm('「'+(proj?proj.name:'')+' 」を削除しますか？\nタスクやファイルへの紐付けも解除されます。'))return;
  dbDel('projects',id);
  // 関連タスクのprojectIdをクリア
  S.tasks.filter(function(t){return t.projectId===id;}).forEach(function(t){dbUp('tasks',t.id,{projectId:''});});
  if(S.proj===id){S.proj=null;S.tab='task';}
  toast('プロジェクトを削除しました');closeModal();
};

function saveTag(){
  var name=v('m-tagname');if(!name)return;
  S.tags.push({name:name,color:S.draft.color});saveTags();toast('タグ「'+name+'」を追加しました');closeModal();
}
window.saveTag=saveTag;

function saveProfile(){
  var name=v('p-name');if(!name)return;
  fb().updateProfile(fb().auth.currentUser,{displayName:name}).then(function(){S.user=fb().auth.currentUser;toast('プロフィールを更新しました');closeModal();});
}
window.saveProfile=saveProfile;

// ── Boot ──
// ── 共有ビュー ──
function loadShareView(token){
  var app=document.getElementById('app');
  app.innerHTML='<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;color:var(--c-text2);font-size:14px">読み込み中...</div>';

  function init(){
    fb().getDoc(fb().doc(fb().db,'team_shares',token)).then(function(snap){
      if(!snap.exists()){
        app.innerHTML=renderShareExpired('リンクが見つかりません');return;
      }
      var share=snap.data();
      // 期限チェック
      if(share.expiresAt){
        var exp=share.expiresAt.toDate?share.expiresAt.toDate():new Date(share.expiresAt);
        if(new Date()>exp){app.innerHTML=renderShareExpired('このリンクは期限切れです');return;}
      }
      S.shareMode=true;S.shareData=share;
      // プロジェクト・イベント・香盤表を取得
      var projId=share.projectId;
      var prom=[];
      prom.push(fb().getDocs(fb().query(fb().collection(fb().db,'team_events'),fb().orderBy('createdAt','asc'))));
      prom.push(fb().getDocs(fb().query(fb().collection(fb().db,'team_koban'),fb().orderBy('createdAt','asc'))));
      prom.push(fb().getDocs(fb().query(fb().collection(fb().db,'team_tasks'),fb().orderBy('createdAt','asc'))));
      if(projId){prom.push(fb().getDoc(fb().doc(fb().db,'team_projects',projId)));}
      Promise.all(prom).then(function(results){
        var events=results[0].docs.map(function(d){return Object.assign({id:d.id},d.data());});
        var koban=results[1].docs.map(function(d){return Object.assign({id:d.id},d.data());});
        var tasks=results[2].docs.map(function(d){return Object.assign({id:d.id},d.data());});
        var proj=projId&&results[3]&&results[3].exists()?Object.assign({id:results[3].id},results[3].data()):null;
        // プロジェクトでフィルタ
        if(projId){
          events=events.filter(function(e){return e.projectId===projId||!e.projectId;});
          koban=koban.filter(function(k){return k.projectId===projId||!k.projectId;});
          tasks=tasks.filter(function(t){return t.projectId===projId;});
        }
        app.innerHTML=renderShareView(share,proj,events,koban,tasks);
      }).catch(function(){app.innerHTML=renderShareExpired('データの読み込みに失敗しました');});
    }).catch(function(){app.innerHTML=renderShareExpired('リンクが無効です');});
  }
  window._fbReady?init():document.addEventListener('fb-ready',init);
}

function renderShareExpired(msg){
  return '<div class="share-expired">'+
    '<div style="font-size:48px">🔒</div>'+
    '<div style="font-size:18px;font-weight:600;color:var(--c-text)">'+msg+'</div>'+
    '<div style="font-size:13px;color:var(--c-text3)">リンクを発行したチームにお問い合わせください</div>'+
    '<div style="margin-top:16px"><div style="font-size:12px;font-weight:700;letter-spacing:1px;color:var(--c-blue)">ZIP TOOL</div></div>'+
  '</div>';
}

function renderShareView(share,proj,events,koban,tasks){
  var today=getToday();
  var html='<div class="share-shell">'+
    '<div class="share-header">'+
      '<div style="width:24px;height:24px;background:var(--c-blue);border-radius:5px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:12px">Z</div>'+
      '<div class="share-logo">ZIP TOOL</div>'+
      '<div class="share-badge">閲覧専用</div>'+
      (share.expiresAt?'<div style="margin-left:auto;font-size:11px;color:var(--c-text3)">期限: '+fmtDate((share.expiresAt.toDate?share.expiresAt.toDate():new Date(share.expiresDate||'')).toISOString().split('T')[0])+'</div>':'')+
    '</div>'+
    '<div class="share-body">'+
      '<div class="share-project">'+(proj?proj.name:'プロジェクト')+'</div>'+
      '<div class="share-meta">共有: '+(share.label||'リンク')+'　　権限: 閲覧のみ</div>';

  // 香盤表セクション
  var kobanDates=Array.from(new Set(koban.map(function(r){return r.date;}).filter(Boolean))).sort();
  if(kobanDates.length){
    html+='<div class="share-section"><div class="share-section-title">📋 香盤表</div>';
    kobanDates.forEach(function(date){
      var dayRows=koban.filter(function(r){return r.date===date;}).sort(function(a,b){return (a.startTime||'').localeCompare(b.startTime||'');});
      html+='<div style="margin-bottom:20px"><div style="font-size:13px;font-weight:600;color:var(--c-text);margin-bottom:10px">'+fmtDateFull(date)+'</div>';
      // タイムライン形式
      var nowJST=new Date(new Date().getTime()+9*60*60*1000);
      var nowMin=nowJST.getUTCHours()*60+nowJST.getUTCMinutes();
      function toM(t){if(!t)return -1;var p=t.split(':');return parseInt(p[0])*60+(parseInt(p[1])||0);}
      dayRows.forEach(function(r){
        var isNow=date===today&&toM(r.startTime)<=nowMin&&(toM(r.endTime)<0||nowMin<toM(r.endTime));
        html+='<div style="display:flex;gap:12px;margin-bottom:10px;padding:10px 14px;background:'+(isNow?'#fffbeb':'var(--c-surface)')+';border:1px solid '+(isNow?'var(--c-amber)':'var(--c-border)')+';border-radius:var(--radius)">'+
          '<div style="width:100px;flex-shrink:0">'+
            '<div style="font-size:14px;font-weight:600;color:var(--c-text)">'+(r.startTime||'')+'</div>'+
            '<div style="font-size:11px;color:var(--c-text3)">'+(r.endTime?'〜 '+r.endTime:'')+'</div>'+
          '</div>'+
          '<div style="flex:1">'+
            '<div style="font-size:14px;font-weight:500;color:var(--c-text);margin-bottom:3px">'+(r.content||'')+'</div>'+
            '<div style="font-size:12px;color:var(--c-text2)">'+
              (r.place?'📍 '+r.place+'　':'')+
              (r.who?'👤 '+(Array.isArray(r.who)?r.who.join('・'):r.who):'')+'</div>'+
            (r.note?'<div style="font-size:11px;color:var(--c-text3);margin-top:3px">'+r.note+'</div>':'')+
            (isNow?'<div style="font-size:11px;font-weight:600;color:var(--c-amber);margin-top:4px">▶ 進行中</div>':'')+
          '</div>'+
        '</div>';
      });
      html+='</div>';
    });
    html+='</div>';
  }

  // 予定セクション（今日以降）
  var futureEvs=events.filter(function(e){return e.date&&e.date>=today&&!e.fromTask;}).sort(function(a,b){return a.date.localeCompare(b.date);}).slice(0,10);
  if(futureEvs.length){
    html+='<div class="share-section"><div class="share-section-title">📅 今後の予定</div>';
    futureEvs.forEach(function(e){
      html+='<div style="display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--c-surface);border:1px solid var(--c-border);border-radius:var(--radius);margin-bottom:8px">'+
        '<div style="width:60px;flex-shrink:0;text-align:center">'+
          '<div style="font-size:11px;color:var(--c-text3)">'+fmtDate(e.date)+'</div>'+
          '<div style="font-size:12px;color:var(--c-text2)">'+(e.allDay?'終日':(e.start||'')+(e.end?'〜'+e.end:''))+'</div>'+
        '</div>'+
        '<div style="flex:1;font-size:14px;font-weight:500;color:var(--c-text)">'+(e.title||'')+'</div>'+
      '</div>';
    });
    html+='</div>';
  }

  // タスクセクション
  var openTasks=tasks.filter(function(t){return t.status!=='完了';}).slice(0,10);
  if(openTasks.length){
    html+='<div class="share-section"><div class="share-section-title">✓ タスク</div>';
    openTasks.forEach(function(t){
      var over=t.due&&t.due<today;
      html+='<div style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--c-surface);border:1px solid var(--c-border);border-radius:var(--radius);margin-bottom:8px">'+
        '<div style="flex:1">'+
          '<div style="font-size:14px;font-weight:500;color:var(--c-text)">'+(t.title||'')+'</div>'+
          (t.due?'<div style="font-size:12px;color:'+(over?'var(--c-red)':'var(--c-text3)')+'">期日 '+fmtDate(t.due)+'</div>':'')+
        '</div>'+
        '<span style="font-size:11px;padding:3px 10px;border-radius:10px;background:'+({'未着手':'#f4f4f5','進行中':'#eff6ff','完了':'#f0fdf4'}[t.status]||'#f4f4f5')+';color:'+({'未着手':'#71717a','進行中':'#2563eb','完了':'#16a34a'}[t.status]||'#71717a')+';font-weight:500">'+t.status+'</span>'+
      '</div>';
    });
    html+='</div>';
  }

  html+='<div style="text-align:center;padding:24px 0;font-size:12px;color:var(--c-text3)">ZIP TOOL で作成された共有ページ</div>';
  html+='</div></div>';
  return html;
}

function boot(){
  // URLに?share=TOKENがあれば共有モードで起動
  var params=new URLSearchParams(window.location.search);
  var token=params.get('share');
  if(token){
    loadShareView(token);
    return;
  }
  window._fbReady?initFb():document.addEventListener('fb-ready',initFb);
}
boot();
</script>
